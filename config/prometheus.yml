global:
  scrape_interval: 10s
  evaluation_interval: 10s
scrape_configs:
  - job_name: 'fastapi-inference'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['fastapi:8000']

  - job_name: 'airflow-scheduler'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['airflow-scheduler:8974']

  - job_name: 'clickhouse-olap'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['clickhouse:8123']

  - job_name: 'prometheus-self'
    static_configs:
      - targets: ['localhost:9090']