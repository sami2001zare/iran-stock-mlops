name: Simple CI

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and test
        run: |
          # Build and test in one go
          docker compose build
          docker compose run --rm airflow-scheduler airflow dags list
          
          # Cleanup
          docker-compose down
