global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'fastapi-inference'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['fastapi:8000']

  - job_name: 'airflow-scheduler'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['airflow-scheduler:8974']
