x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.2.2}
  build: .
  env_file:
    - ${ENV_FILE_PATH:-.env}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: redis://redis:6379/0
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    PYTHONPATH: '/opt/airflow:/opt/airflow/src:/opt/airflow/model'
    MLFLOW_TRACKING_URI: 'http://mlflow:5000'
    MINIO_ENDPOINT: 'http://minio:9000'
    AWS_ACCESS_KEY_ID: 'minioadmin'
    AWS_SECRET_ACCESS_KEY: 'minioadmin'
    AWS_DEFAULT_REGION: 'us-east-1'
    S3_BUCKET_LAKEHOUSE: 'lakehouse'
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/src:/opt/airflow/src
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/model:/opt/airflow/model
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Shared Storage & Infrastructure (Postgres, Redis, MinIO Lakehouse)
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    
  redis:
    image: redis:7.2-bookworm
    expose:
      - 6379
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  minio-createbuckets:
    image: minio/minio:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO...' &&
      until mc alias set myminio http://minio:9000 minioadmin minioadmin; do sleep 2; done &&
      echo 'Creating Lakehouse buckets (Bronze, Silver, Gold, MLflow Artifacts)...' &&
      mc mb --ignore-existing myminio/lakehouse &&
      mc mb --ignore-existing myminio/mlflow-artifacts &&
      echo 'Buckets configured successfully!'
      "

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    ports:
      - "8123:8123"
      - "9002:9000"
    environment:
      CLICKHOUSE_DB: quantitative_olap
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  # ─────────────────────────────────────────────────────────────────────────────
  # Apache Airflow 3.x Control Plane & Workers
  # ─────────────────────────────────────────────────────────────────────────────
  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "${AIRFLOW_PORT:-8085}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test: ["CMD-SHELL", 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          export AIRFLOW_UID=$$(id -u)
        fi
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config,src,model}
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config,src,model}
        /entrypoint airflow version
        /entrypoint airflow db migrate
        /entrypoint airflow users create -u admin -p admin -r Admin -e admin@platform.ai -f Admin -l User || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-admin}
    user: "0:0"

  # ─────────────────────────────────────────────────────────────────────────────
  # MLOps Layer (MLflow & FastAPI Inference Engine)
  # ─────────────────────────────────────────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: mlflow
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri postgresql+psycopg2://airflow:airflow@postgres/mlflow
      --default-artifact-root /mlflow/artifacts
    ports:
      - "${MLFLOW_PORT:-5001}:5000"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  fastapi:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: fastapi
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    environment:
      ETH_MODEL_DIR:       '/model/eth_model_artifacts'
      MLFLOW_TRACKING_URI: 'http://mlflow:5000'
      MLFLOW_MODEL_NAME:   'ETHPricePredictor'
      PSI_THRESHOLD:       '0.20'
      REDIS_URL:           'redis://redis:6379/0'
      PYTHONPATH:          '/app:/model:/src'
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/model:/model
      - ${AIRFLOW_PROJ_DIR:-.}/src:/src
      - ${AIRFLOW_PROJ_DIR:-.}/api:/app
    depends_on:
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  # ─────────────────────────────────────────────────────────────────────────────
  # Observability Layer (Prometheus & Grafana)
  # ─────────────────────────────────────────────────────────────────────────────
  # prometheus:
  #   image: prom/prometheus:v2.51.1
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ${AIRFLOW_PROJ_DIR:-.}/config:/etc/prometheus:ro
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #     - '--storage.tsdb.path=/prometheus'
  #   restart: always

  # grafana:
  #   image: grafana/grafana:10.4.0
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     GF_SECURITY_ADMIN_USER: admin
  #     GF_SECURITY_ADMIN_PASSWORD: admin
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #   depends_on:
  #     - prometheus
  #   restart: always

  tests:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: tests
    profiles: [ci]
    command: pytest /tests/ -v --tb=short
    environment:
      PYTHONPATH: '/model:/app:/src'
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}/model:/model
      - ${AIRFLOW_PROJ_DIR:-.}/src:/src
      - ${AIRFLOW_PROJ_DIR:-.}/tests:/tests
      - ${AIRFLOW_PROJ_DIR:-.}/api:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-db-volume:
  mlflow-artifacts:
  minio-data:
  clickhouse-data:
  grafana-data:
